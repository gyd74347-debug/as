<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — NextGen Work</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --purple: #7B6EF6; --purple-light: #A99DF9; --purple-dark: #5A50C8;
      --navy: #0D0D1A; --navy2: #12122A; --card: #16162E;
      --border: rgba(123,110,246,0.18); --text: #F0EFF8; --muted: #8888AA;
      --green: #22D68A; --pink: #F06292; --amber: #F6C244;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; }

    .admin-nav { background: var(--navy2); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .admin-nav .logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
    .admin-nav .logo span { color: var(--purple); }
    .admin-badge { background: rgba(123,110,246,0.15); color: var(--purple-light); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; font-size: 12px; }
    .back-link { color: var(--muted); font-size: 13px; text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: var(--purple); }

    .admin-body { padding: 32px; max-width: 1200px; margin: 0 auto; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-card .value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }

    /* FILTERS */
    .filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 8px 18px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .filter-btn.active, .filter-btn:hover { background: var(--purple); color: #fff; border-color: var(--purple); }
    .filters-right { margin-left: auto; }
    select.filter-select { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; }

    /* TABLE */
    .table-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: rgba(123,110,246,0.08); }
    thead th { padding: 14px 16px; text-align: left; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
    tbody tr { border-top: 1px solid rgba(255,255,255,0.04); transition: background 0.15s; }
    tbody tr:hover { background: rgba(123,110,246,0.05); }
    td { padding: 14px 16px; font-size: 14px; vertical-align: middle; }
    .td-name { font-weight: 500; }
    .td-phone a { color: var(--green); text-decoration: none; }
    .td-phone a:hover { text-decoration: underline; }

    /* STATUS BADGE */
    .badge { display: inline-block; padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 500; }
    .badge-new { background: rgba(123,110,246,0.15); color: var(--purple-light); }
    .badge-contacted { background: rgba(246,194,68,0.15); color: var(--amber); }
    .badge-completed { background: rgba(34,214,138,0.15); color: var(--green); }
    .badge-cancelled { background: rgba(240,98,146,0.15); color: var(--pink); }

    /* ACTION BUTTONS */
    .action-btns { display: flex; gap: 6px; }
    .action-btn { border: none; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
    .action-btn:hover { opacity: 0.8; }
    .btn-contacted { background: rgba(246,194,68,0.15); color: var(--amber); }
    .btn-completed { background: rgba(34,214,138,0.15); color: var(--green); }
    .btn-delete { background: rgba(240,98,146,0.15); color: var(--pink); }

    .empty-state { text-align: center; padding: 64px; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

    .loading { text-align: center; padding: 48px; color: var(--muted); }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; font-size: 14px; z-index: 999; display: none; }
    .toast.show { display: block; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .admin-body { padding: 16px; }
      .table-wrapper { overflow-x: auto; }
      table { min-width: 700px; }
    }
  </style>
</head>
<body>

<nav class="admin-nav">
  <div>
    <div class="logo"><span>Next</span>Gen Work</div>
  </div>
  <div class="admin-badge">Admin Panel</div>
  <a href="/" class="back-link">← Back to Website</a>
</nav>

<div class="admin-body">
  <div class="stats-grid">
    <div class="stat-card"><div class="label">Total Enquiries</div><div class="value" id="statTotal" style="color:var(--purple-light)">—</div></div>
    <div class="stat-card"><div class="label">New</div><div class="value" id="statNew" style="color:var(--purple)">—</div></div>
    <div class="stat-card"><div class="label">Contacted</div><div class="value" id="statContacted" style="color:var(--amber)">—</div></div>
    <div class="stat-card"><div class="label">Completed</div><div class="value" id="statCompleted" style="color:var(--green)">—</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterStatus('')" id="f-all">All</button>
    <button class="filter-btn" onclick="filterStatus('new')" id="f-new">New</button>
    <button class="filter-btn" onclick="filterStatus('contacted')" id="f-contacted">Contacted</button>
    <button class="filter-btn" onclick="filterStatus('completed')" id="f-completed">Completed</button>
    <div class="filters-right">
      <select class="filter-select" onchange="filterService(this.value)">
        <option value="">All Services</option>
        <option>Video Editing</option>
        <option>Web Design</option>
        <option>Social Media Management</option>
        <option>Multiple Services</option>
      </select>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Service</th>
          <th>Message</th>
          <th>Status</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="enquiryTable">
        <tr><td colspan="8" class="loading">Loading enquiries...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentStatus = '';
  let currentService = '';

  async function loadEnquiries() {
    const params = new URLSearchParams();
    if (currentStatus) params.append('status', currentStatus);
    if (currentService) params.append('service', currentService);

    try {
      const res = await fetch('/api/admin/enquiries?' + params.toString());
      const json = await res.json();
      if (!json.success) return;

      // Update stats
      const s = json.stats;
      document.getElementById('statTotal').textContent = s.total;
      document.getElementById('statNew').textContent = s.new_count;
      document.getElementById('statContacted').textContent = s.contacted_count;
      document.getElementById('statCompleted').textContent = s.completed_count;

      const tbody = document.getElementById('enquiryTable');
      if (!json.data.length) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">📭</div><div>No enquiries found</div></div></td></tr>`;
        return;
      }

      tbody.innerHTML = json.data.map(e => `
        <tr id="row-${e.id}">
          <td style="color:var(--muted)">${e.id}</td>
          <td class="td-name">${e.name}</td>
          <td class="td-phone"><a href="https://wa.me/91${e.phone.replace(/\D/g,'')}" target="_blank">${e.phone}</a></td>
          <td>${e.service}</td>
          <td style="color:var(--muted);max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${e.message}">${e.message}</td>
          <td><span class="badge badge-${e.status}">${e.status}</span></td>
          <td style="color:var(--muted);font-size:12px;">${new Date(e.created_at).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'})}</td>
          <td>
            <div class="action-btns">
              ${e.status !== 'contacted' ? `<button class="action-btn btn-contacted" onclick="updateStatus(${e.id},'contacted')">Contacted</button>` : ''}
              ${e.status !== 'completed' ? `<button class="action-btn btn-completed" onclick="updateStatus(${e.id},'completed')">Done</button>` : ''}
              <button class="action-btn btn-delete" onclick="deleteEnquiry(${e.id})">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      document.getElementById('enquiryTable').innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--pink)">Could not connect to server.</td></tr>`;
    }
  }

  async function updateStatus(id, status) {
    try {
      await fetch(`/api/admin/enquiries/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      showToast(`Status updated to "${status}"`);
      loadEnquiries();
    } catch (e) { showToast('Error updating status', true); }
  }

  async function deleteEnquiry(id) {
    if (!confirm('Delete this enquiry?')) return;
    try {
      await fetch(`/api/admin/enquiries/${id}`, { method: 'DELETE' });
      showToast('Enquiry deleted');
      loadEnquiries();
    } catch (e) { showToast('Error deleting enquiry', true); }
  }

  function filterStatus(status) {
    currentStatus = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('f-' + (status || 'all')).classList.add('active');
    loadEnquiries();
  }

  function filterService(service) {
    currentService = service;
    loadEnquiries();
  }

  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = (error ? '❌ ' : '✅ ') + msg;
    t.style.color = error ? 'var(--pink)' : 'var(--green)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadEnquiries();
  setInterval(loadEnquiries, 30000); // auto refresh every 30s
</script>
</body>
</html>
